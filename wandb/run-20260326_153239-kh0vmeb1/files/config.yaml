logging:
    value:
        format: text
        level: INFO
paths:
    value:
        log_file: logs/pipeline.log
        model_artifact: models/model.joblib
        predictions_artifact: reports/predictions.csv
        processed_data: data/processed/clean.csv
        raw_data: data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv
problem:
    value:
        identifier_column: customerID
        problem_type: classification
        target_column: Churn
split:
    value:
        random_state: 42
        test_size: 0.3
training:
    value:
        classification:
            max_iter: 2000
            random_state: 42
validation:
    value:
        drop_na: true
        required_columns:
            - customerID
            - tenure
            - MonthlyCharges
            - TotalCharges
            - Churn
wandb:
    value:
        class_names:
            - No Churn
            - Churn
        enabled: true
        group: baseline
        job_type: training
        log_auc_plots: true
        log_confusion_matrix: true
        log_predictions: true
        log_predictions_table: true
        model_artifact_name: telco_churn_model
        name: baseline-logistic-regression
        notes: Baseline logistic regression on Telco churn dataset
        predictions_table_rows: 200
        project: telco-churn
        tags:
            - baseline
            - logreg
