name: MLOps Quality Gate

on:
    pull_request:
        branches: ["main", "dev"]
    push:
        branches: ["main", "dev"]
    workflow_dispatch:

jobs:
    ci-test-build:
        runs-on: ubuntu-latest
        timeout-minutes: 25
        env:
            WANDB_MODE: disabled
            MODEL_SOURCE: local # CI validates code and packaging, NOT W&B uptime
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Miniconda
              uses: conda-incubator/setup-miniconda@v3
              with:
                  auto-activate-base: true

            - name: Install conda-lock and create exact environment
              shell: bash -el {0}
              run: |
                  conda install -n base -c conda-forge conda-lock -y
                  conda run -n base conda-lock install --name mlops_project conda-lock.yml

            - name: Run Pytest
              shell: bash -el {0}
              run: |
                  conda run -n mlops_project pytest tests/ -v --ignore=tests/test_api.py

            - name: Validate Docker build
              run: docker build -t telco-churn:test .
